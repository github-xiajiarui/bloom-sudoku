<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>数独 · Bloom Sudoku</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 30%, #e8eaf6 60%, #fce4ec 100%);
  min-height: 100vh; min-height: 100dvh;
  display: flex; justify-content: center; align-items: flex-start;
  padding-top: 8px;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.container { max-width: 420px; width: 100%; padding: 0 12px 12px 12px; }

/* Header */
.header { text-align: center; margin-bottom: 4px; }
.header h1 {
  display: inline; font-size: 24px;
  background: linear-gradient(135deg, #e91e63, #9c27b0, #7c3aed);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; letter-spacing: 2px;
}
.version { font-size: 10px; color: #b39ddb; vertical-align: super; margin-left: 2px; }

/* Difficulty */
.diff-row { display: flex; gap: 6px; margin-bottom: 6px; justify-content: center; }
.diff-btn {
  flex:1; padding: 7px 4px; border: 2px solid #e1bee7; border-radius: 13px;
  background: #fff9fb; font-size: 12px; font-weight: 600; color: #7b1fa2;
  cursor: pointer; transition: all .2s; max-width: 100px;
}
.diff-btn.active { background: linear-gradient(135deg, #f06292, #ab47bc); color: #fff; border-color: transparent; }

/* Board */
.board-wrap {
  position: relative; background: #fff; border-radius: 16px; padding: 8px;
  box-shadow: 0 6px 24px rgba(156,39,176,.10);
  margin-bottom: 6px;
}
.board-info {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 4px 5px 4px; font-size: 12px; font-weight: 600;
}
.board-info .mistakes { color: #e57373; }
.board-info .timer { color: #9c27b0; }
table { border-collapse: collapse; margin: 0 auto; width: 100%; max-width: 360px; table-layout: fixed; }
td {
  width: 11.11%; padding: 0; vertical-align: top;
  border: 0.5px dotted #d1c4e9;
}
.cell-wrap { position: relative; width: 100%; padding-bottom: 100%; }
.cell-inner {
  position: absolute; inset: 1px; display: flex; align-items: center; justify-content: center;
  font-size: clamp(16px,5vw,24px); font-weight: 600;
  border-radius: 6px; cursor: pointer; transition: background .15s;
  color: #5c007a;
}

/* Notes (pencil marks) */
.cell-inner .notes-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr;
  width: 100%; height: 100%; padding: 1px;
}
.cell-inner .notes-grid span {
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(7px,1.6vw,10px); font-weight: 500; color: #888; line-height: 1;
}

.cell-inner.given { color: #4a148c; font-weight: 700; }
.cell-inner.player { color: #c62828; }
.cell-inner.error {
  color: #d50000 !important; font-size: clamp(36px,10vw,48px) !important; font-weight: 900;
  animation: errorPulse .5s ease-in-out;
}
.cell-inner.hinted { color: #1565c0; animation: hintFlash .6s ease-in-out; }

/* Grid borders - override dotted with solid for 3x3 block edges */
td.left { border-left: 2.5px solid #7b1fa2; }
td.right { border-right: 2.5px solid #7b1fa2; }
td.top { border-top: 2.5px solid #7b1fa2; }
td.bottom { border-bottom: 2.5px solid #7b1fa2; }

/* Selection & highlights */
.cell-inner.selected {
  box-shadow: 0 0 0 3px #e91e63;
  animation: breathe 1.6s ease-in-out infinite;
}
.cell-inner.same-num { background: rgba(233,30,99,.12); }
.cell-inner.same-row-col { background: rgba(179,136,255,.10); }
.notes-mode .cell-inner:not(.given) { background: rgba(255,215,0,.06); }

@keyframes breathe {
  0%,100% { box-shadow: 0 0 0 3px #e91e63; }
  50% { box-shadow: 0 0 0 8px rgba(233,30,99,.25), 0 0 0 3px #e91e63; }
}
@keyframes errorPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); color: #ff1744; }
}
@keyframes hintFlash {
  0% { background: rgba(21,101,192,.35); transform: scale(1.08); }
  100% { background: transparent; transform: scale(1); }
}
@keyframes dropBounce {
  0% { transform: translateY(-200px); opacity: 0; }
  55% { transform: translateY(4px); opacity: 1; }
  70% { transform: translateY(-6px); }
  85% { transform: translateY(3px); }
  100% { transform: translateY(0); }
}
@keyframes flyUp {
  0% { transform: translateY(0); opacity: 1; }
  40% { transform: translateY(-8px); }
  60% { transform: translateY(4px); }
  80% { transform: translateY(-6px); }
  100% { transform: translateY(-300px); opacity: 0; }
}

/* Num pad row (1-9 + erase at end) */
.numpad-row { display: flex; gap: 3px; margin-bottom: 6px; justify-content: center; align-items: center; }
.numpad { display: flex; gap: 3px; flex: 1; justify-content: center; }
.numpad button {
  flex: 1; height: 38px; max-width: 34px; border-radius: 10px; border: 2px solid #e1bee7;
  background: #fff; font-size: 18px; font-weight: 700; color: #6a1b9a;
  cursor: pointer; transition: all .15s;
}
.numpad button:active:not(:disabled) { background: #f06292; color: #fff; }
.numpad button:disabled { opacity: .3; cursor: not-allowed; background: #f5f5f5; color: #ccc; }
.numpad button.count-9 { border-color: #81c784; background: #e8f5e9; color: #a5d6a7; }
.numpad-row .btn-erase {
  width: 30px; height: 38px; border-radius: 10px; border: 2px solid #ffcdd2;
  background: #fff; font-size: 16px; font-weight: 700; color: #ef5350;
  cursor: pointer; transition: all .15s; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.numpad-row .btn-erase:active { background: #ff5252; color: #fff; }

/* Action row */
.actions { display: flex; gap: 5px; margin-bottom: 0; justify-content: center; }
.act-btn {
  flex: 1; padding: 7px 4px; border-radius: 14px; border: none; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .2s; color: #fff; max-width: 85px; white-space: nowrap;
}
.btn-notes { background: linear-gradient(135deg, #a5d6a7, #66bb6a); }
.btn-notes.active { background: linear-gradient(135deg, #ffb74d, #ff9800); box-shadow: 0 0 0 3px rgba(255,152,0,.3); }
.btn-hint { background: linear-gradient(135deg, #64b5f6, #42a5f5); }
.btn-undo { background: linear-gradient(135deg, #ffb74d, #ff9800); }
.btn-new { background: linear-gradient(135deg, #ce93d8, #ab47bc); }

/* Hint panel - reserved space with visibility toggle to prevent layout shift */
.hint-area { min-height: 0; transition: min-height .2s; }
.hint-area.active { min-height: 52px; }
.hint-panel {
  background: #fff; border-radius: 12px; padding: 8px 12px; margin-top: 4px;
  box-shadow: 0 3px 12px rgba(0,0,0,.06); font-size: 12px; color: #37474f;
  line-height: 1.5; visibility: hidden; word-break: break-all;
}
.hint-panel.show { visibility: visible; animation: fadeIn .3s; }
.hint-line1 { font-weight: 700; color: #6a1b9a; margin-bottom: 3px; }
.hint-line2 { color: #546e7a; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

/* Overlays */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none;
  align-items: center; justify-content: center; z-index: 100;
}
.overlay.show { display: flex; }
.overlay-inner {
  background: #fff; border-radius: 24px; padding: 28px 24px; text-align: center;
  max-width: 320px; width: 90%;
}
.overlay-inner h2 { color: #7b1fa2; margin-bottom: 10px; font-size: 22px; }
.overlay-inner p { color: #666; margin-bottom: 14px; font-size: 14px; }
.overlay-inner .confirm-btns { display: flex; gap: 10px; justify-content: center; }
.overlay-inner .confirm-btns button {
  padding: 10px 28px; border-radius: 20px; border: none; font-size: 15px; font-weight: 600; cursor: pointer;
}
.btn-yes { background: linear-gradient(135deg, #ef5350, #e53935); color: #fff; }
.btn-no { background: #eee; color: #666; }
</style>
</head>
<body>
<div class="container" id="container">
  <div class="header"><h1>Bloom Sudoku</h1><span class="version" id="version"></span></div>

  <div class="diff-row">
    <button class="diff-btn" data-diff="40">🌸 简单 40空</button>
    <button class="diff-btn active" data-diff="50">🌺 中等 50空</button>
    <button class="diff-btn" data-diff="60">🌷 困难 60空</button>
  </div>

  <div class="board-wrap">
    <div class="board-info">
      <span class="mistakes" id="mistakes">错误: 0/3</span>
      <span class="timer" id="timer">⏱ 00:00</span>
    </div>
    <table id="board"></table>
  </div>

  <div class="numpad-row">
    <div class="numpad" id="numpad"></div>
    <button class="btn-erase" onclick="eraseCell()" title="擦除">✕</button>
  </div>

  <div class="actions">
    <button class="act-btn btn-notes" id="btnNotes" onclick="toggleNotes()">📝 笔记</button>
    <button class="act-btn btn-hint" onclick="showHint()">💡 提示</button>
    <button class="act-btn btn-undo" onclick="undoMove()">↩ 撤销</button>
    <button class="act-btn btn-new" onclick="confirmNewGame()">🔄 重开</button>
  </div>

  <div class="hint-area" id="hintArea">
    <div class="hint-panel" id="hintPanel"></div>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div class="overlay-inner">
    <h2>🎉 恭喜通关！</h2>
    <p id="overlayMsg"></p>
    <button class="act-btn btn-new" onclick="closeWinOverlay();newGame()">再来一局</button>
  </div>
</div>

<div class="overlay" id="confirmOverlay">
  <div class="overlay-inner">
    <h2>确认重开</h2>
    <p>当前进度将丢失，是否确定重新开始？</p>
    <div class="confirm-btns">
      <button class="btn-no" onclick="closeConfirmOverlay()">取消</button>
      <button class="btn-yes" onclick="closeConfirmOverlay();newGame()">确定</button>
    </div>
  </div>
</div>

<script>
// ======== SUDOKU ENGINE ========

const APP_VERSION = 'v5';

// 40/50: solved source grids, puzzles generated at runtime with logic solvability
// 60: pre-made puzzle configurations (puzzle + solved), each with unique solution
const STORED_PUZZLES = {
  40: [
    '582413769714569382396287514437198256168325947259674831841932675623751498975846123',
    '653124798247589163198637452386712549572498316419365827731256984865943271924871635',
    '637124598895376214412589367263418975749265831158937642376851429981642753524793186',
    '839124657267538419154679823425361798698457132713892546982715364341286975576943281',
    '562173489134298657987456213415632798376589142298741365823914576651827934749365821'
  ],
  50: [
    '298143567614572398753689142125897436469235871387416925831724659542968713976351284',
    '856341297497526318321798564145267983268139745973854621534912876682475139719683452',
    '742316958985247136163598472214789365378165249659423781496871523521634897837952614',
    '561237849987145236423689157274391568135862974698754321716528493842973615359416782',
    '869123547475698123321475698296314785147852936538967412754239861913586274682741359'
  ],
  60: {
    solved: '418263597537914268269578143143892756792456381685137429976325814851749632324681975',
    puzzles: [
      '008200500000904200000000100040000006090056080000030000006000000001000032020080900',
      '008000000500000060000078040040090050000006300080130000070005800000040000320000900',
      '000060000500000208060570000100002050702400300000000009000000010850040000004000900',
      '010000000507010008000008043000000750702400000000000000000005004801000002300600070',
      '008003090007000260000500100100802000090400000600000000000000804800009000020001005'
    ]
  }
};

const generatedPuzzles = { 40: [], 50: [], 60: [] };
let generationStarted = { 40: false, 50: false, 60: false };

// ======== SOLVER ========
function solve(board) {
  const empty = board.indexOf(0);
  if (empty === -1) return true;
  const r = Math.floor(empty / 9), c = empty % 9;
  const cands = getCandidates(board, r, c);
  for (const n of cands) {
    board[empty] = n;
    if (solve(board)) return true;
    board[empty] = 0;
  }
  return false;
}

function isValidPlacement(board, r, c, n) {
  for (let i = 0; i < 9; i++) {
    if (board[r * 9 + i] === n) return false;
    if (board[i * 9 + c] === n) return false;
  }
  const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
  for (let i = br; i < br + 3; i++)
    for (let j = bc; j < bc + 3; j++)
      if (board[i * 9 + j] === n) return false;
  return true;
}

function getCandidates(board, r, c) {
  const cands = [];
  for (let n = 1; n <= 9; n++)
    if (isValidPlacement(board, r, c, n)) cands.push(n);
  return cands;
}

function hasConflict(board, idx) {
  const val = board[idx];
  if (val === 0) return false;
  const r = Math.floor(idx / 9), c = idx % 9;
  for (let j = 0; j < 9; j++) {
    if (j !== c && board[r * 9 + j] === val) return true;
  }
  for (let i = 0; i < 9; i++) {
    if (i !== r && board[i * 9 + c] === val) return true;
  }
  const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
  for (let i = br; i < br + 3; i++)
    for (let j = bc; j < bc + 3; j++)
      if ((i !== r || j !== c) && board[i * 9 + j] === val) return true;
  return false;
}

function generateSolvedPuzzle() {
  const board = new Array(81).fill(0);
  for (let b = 0; b < 3; b++) {
    const nums = shuffle([1,2,3,4,5,6,7,8,9]);
    let idx = 0;
    for (let i = b * 3; i < b * 3 + 3; i++)
      for (let j = b * 3; j < b * 3 + 3; j++)
        board[i * 9 + j] = nums[idx++];
  }
  solve(board);
  return board;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ======== TRANSFORMATIONS ========
function applyTransformations(board) {
  let b = [...board];
  const op = Math.floor(Math.random() * 7);
  switch (op) {
    case 0: b = mirrorH(b); break;
    case 1: b = mirrorV(b); break;
    case 2: b = rotate90(b); break;
    case 3: b = rotate90(b); b = rotate90(b); break;
    case 4: b = rotate90(b); b = rotate90(b); b = rotate90(b); break;
    case 5: b = mirrorH(b); b = rotate90(b); break;
    case 6: b = mirrorV(b); b = rotate90(b); break;
  }
  const shift = Math.floor(Math.random() * 8) + 1;
  b = b.map(v => ((v - 1 + shift) % 9) + 1);
  return b;
}

function mirrorH(b) {
  const r = [];
  for (let i = 0; i < 9; i++)
    for (let j = 0; j < 9; j++)
      r[i * 9 + j] = b[i * 9 + (8 - j)];
  return r;
}
function mirrorV(b) {
  const r = [];
  for (let i = 0; i < 9; i++)
    for (let j = 0; j < 9; j++)
      r[i * 9 + j] = b[(8 - i) * 9 + j];
  return r;
}
function rotate90(b) {
  const r = [];
  for (let i = 0; i < 9; i++)
    for (let j = 0; j < 9; j++)
      r[j * 9 + (8 - i)] = b[i * 9 + j];
  return r;
}

// Apply the same transformation as applyTransformations, preserving 0 cells
function applyTransformationsReuse(board) {
  let b = [...board];
  const op = Math.floor(Math.random() * 7);
  switch (op) {
    case 0: b = mirrorH(b); break;
    case 1: b = mirrorV(b); break;
    case 2: b = rotate90(b); break;
    case 3: b = rotate90(b); b = rotate90(b); break;
    case 4: b = rotate90(b); b = rotate90(b); b = rotate90(b); break;
    case 5: b = mirrorH(b); b = rotate90(b); break;
    case 6: b = mirrorV(b); b = rotate90(b); break;
  }
  const shift = Math.floor(Math.random() * 8) + 1;
  b = b.map(v => v === 0 ? 0 : ((v - 1 + shift) % 9) + 1);
  return b;
}

// ======== PUZZLE CREATION ========
function createPuzzle(solved, emptyCount, requireLogic) {
  const puzzle = [...solved];
  const cells = shuffle([...Array(81).keys()]);
  let removed = 0;
  for (const idx of cells) {
    if (removed >= emptyCount) break;
    const backup = puzzle[idx];
    puzzle[idx] = 0;
    const copy = [...puzzle];
    if (solve(copy) && hasUniqueSolution([...puzzle])) {
      if (!requireLogic || isLogicallySolvable([...puzzle])) {
        removed++;
        continue;
      }
    }
    puzzle[idx] = backup;
  }
  return { puzzle, removed };
}

function hasUniqueSolution(board) {
  let count = 0;
  function countSolve(b) {
    if (count >= 2) return;
    const empty = b.indexOf(0);
    if (empty === -1) { count++; return; }
    const r = Math.floor(empty / 9), c = empty % 9;
    for (let n = 1; n <= 9; n++) {
      if (isValidPlacement(b, r, c, n)) {
        b[empty] = n;
        countSolve(b);
        b[empty] = 0;
        if (count >= 2) return;
      }
    }
  }
  countSolve([...board]);
  return count === 1;
}

function isLogicallySolvable(puzzle) {
  const board = [...puzzle];
  let changed = true;
  while (changed) {
    changed = false;
    for (let i = 0; i < 81; i++) {
      if (board[i] !== 0) continue;
      const r = Math.floor(i / 9), c = i % 9;
      const cands = getCandidates(board, r, c);
      // Naked single
      if (cands.length === 1) { board[i] = cands[0]; changed = true; continue; }
      // Hidden single
      for (const n of cands) {
        let rowCount = 0, rowIdx = -1;
        for (let j = 0; j < 9; j++) {
          if (board[r * 9 + j] === 0 && getCandidates(board, r, j).includes(n)) { rowCount++; rowIdx = r * 9 + j; }
        }
        if (rowCount === 1) { board[rowIdx] = n; changed = true; break; }
        let colCount = 0, colIdx = -1;
        for (let j = 0; j < 9; j++) {
          if (board[j * 9 + c] === 0 && getCandidates(board, j, c).includes(n)) { colCount++; colIdx = j * 9 + c; }
        }
        if (colCount === 1) { board[colIdx] = n; changed = true; break; }
        let boxCount = 0, boxIdx = -1;
        const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
        for (let i2 = br; i2 < br + 3; i2++)
          for (let j2 = bc; j2 < bc + 3; j2++) {
            if (board[i2 * 9 + j2] === 0 && getCandidates(board, i2, j2).includes(n)) { boxCount++; boxIdx = i2 * 9 + j2; }
          }
        if (boxCount === 1) { board[boxIdx] = n; changed = true; break; }
      }
      if (changed) break;
    }
  }
  return board.indexOf(0) === -1;
}

// ======== GAME STATE ========
let difficulty = 50;
let solved = null;
let puzzle = null;
let playerBoard = null;
let givenMask = null;
let selectedRow = -1, selectedCol = -1;
let mistakes = 0;
let timeSec = 0;
let timerInterval = null;
let history = [];
let notes = null;
let notesMode = false;
let hintPanelEl, hintAreaEl, boardEl, numpadEl, timerEl, mistakesEl, winOverlayEl, overlayMsgEl, confirmOverlayEl, btnNotesEl, containerEl;
let puzzlePool = { 40: [], 50: [], 60: [] };
let currentPoolIdx = { 40: 0, 50: 0, 60: 0 };

// ======== INIT ========
function init() {
  hintPanelEl = document.getElementById('hintPanel');
  hintAreaEl = document.getElementById('hintArea');
  boardEl = document.getElementById('board');
  numpadEl = document.getElementById('numpad');
  timerEl = document.getElementById('timer');
  mistakesEl = document.getElementById('mistakes');
  winOverlayEl = document.getElementById('winOverlay');
  overlayMsgEl = document.getElementById('overlayMsg');
  confirmOverlayEl = document.getElementById('confirmOverlay');
  btnNotesEl = document.getElementById('btnNotes');
  containerEl = document.getElementById('container');
  document.getElementById('version').textContent = APP_VERSION;

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      difficulty = parseInt(btn.dataset.diff);
      newGame();
    });
  });

  buildNumpad();
  initPuzzlePools();
  newGame();
}

function isValidSolved(board) {
  for (let i = 0; i < 81; i++) {
    if (board[i] < 1 || board[i] > 9) return false;
    const r = Math.floor(i / 9), c = i % 9;
    const val = board[i];
    board[i] = 0;
    if (!isValidPlacement(board, r, c, val)) { board[i] = val; return false; }
    board[i] = val;
  }
  return true;
}

function initPuzzlePools() {
  for (const d of [40, 50]) {
    puzzlePool[d] = [];
    for (const s of STORED_PUZZLES[d]) {
      const b = s.split('').map(Number);
      if (isValidSolved([...b]) && hasUniqueSolution(b) && solve([...b])) {
        puzzlePool[d].push(b);
      } else {
        puzzlePool[d].push(generateSolvedPuzzle());
      }
    }
    currentPoolIdx[d] = 0;
    generationStarted[d] = false;
  }
  // 60-empty: use pre-made puzzle+answer pairs
  const data60 = STORED_PUZZLES[60];
  puzzlePool[60] = data60.puzzles.map(p => ({
    solved: data60.solved.split('').map(Number),
    puzzle: p.split('').map(Number)
  }));
  currentPoolIdx[60] = 0;
  generationStarted[60] = false;
}

function ensurePool(diff) {
  if (diff === 60) return; // 60 uses pre-made puzzles, no generation needed
  if (puzzlePool[diff].length >= currentPoolIdx[diff] + 1) return;
  if (puzzlePool[diff].length < 20) {
    for (let i = 0; i < 5; i++) {
      puzzlePool[diff].push(generateSolvedPuzzle());
    }
  }
}

function getNextSourcePuzzle(diff) {
  if (diff === 60) {
    if (currentPoolIdx[60] >= puzzlePool[60].length) currentPoolIdx[60] = 0;
    return puzzlePool[60][currentPoolIdx[60]++];
  }
  if (currentPoolIdx[diff] >= puzzlePool[diff].length) {
    for (let i = 0; i < 5; i++) {
      puzzlePool[diff].push(generateSolvedPuzzle());
    }
  }
  return puzzlePool[diff][currentPoolIdx[diff]++];
}

function startBackgroundGeneration() {
  for (const d of [40, 50]) {
    if (generationStarted[d]) continue;
    generationStarted[d] = true;
    let toGenerate = 15 - (puzzlePool[d].length - 5);
    if (toGenerate <= 0) continue;
    function genOne(diff, remaining) {
      if (remaining <= 0) return;
      puzzlePool[diff].push(generateSolvedPuzzle());
      setTimeout(() => genOne(diff, remaining - 1), 200);
    }
    setTimeout(() => genOne(d, toGenerate), 500);
  }
}

// ======== NOTES ========
function toggleNotes() {
  notesMode = !notesMode;
  if (notesMode) {
    btnNotesEl.classList.add('active');
    btnNotesEl.textContent = '📝 笔记中';
    containerEl.classList.add('notes-mode');
  } else {
    btnNotesEl.classList.remove('active');
    btnNotesEl.textContent = '📝 笔记';
    containerEl.classList.remove('notes-mode');
  }
}

function toggleNote(r, c, n) {
  const idx = r * 9 + c;
  if (!notes[idx]) notes[idx] = new Set();
  if (notes[idx].has(n)) {
    notes[idx].delete(n);
    if (notes[idx].size === 0) notes[idx] = null;
  } else {
    notes[idx].add(n);
  }
}

// ======== NEW GAME ========
function newGame() {
  stopTimer();
  mistakes = 0;
  timeSec = 0;
  history = [];
  notes = new Array(81).fill(null);
  notesMode = false;
  btnNotesEl.classList.remove('active');
  btnNotesEl.textContent = '📝 笔记';
  containerEl.classList.remove('notes-mode');
  selectedRow = -1; selectedCol = -1;
  updateTimer();
  updateMistakes();
  hintPanelEl.classList.remove('show');
  hintPanelEl.innerHTML = '';
  hintAreaEl.classList.remove('active');
  winOverlayEl.classList.remove('show');
  confirmOverlayEl.classList.remove('show');

  ensurePool(difficulty);
  if (difficulty === 60) {
    // 60-empty: use pre-made puzzle+answer pair
    const pair = getNextSourcePuzzle(difficulty);
    solved = applyTransformations(pair.solved);
    puzzle = applyTransformationsReuse(pair.puzzle);
  } else {
    const source = getNextSourcePuzzle(difficulty);
    const transformed = applyTransformations(source);
    solved = transformed;
    const requireLogic = difficulty <= 50;
    const { puzzle: pzl } = createPuzzle(transformed, difficulty, requireLogic);
    puzzle = pzl;
  }
  playerBoard = [...puzzle];
  givenMask = puzzle.map(v => v !== 0);

  renderBoard();
  updateNumpad();
  startBackgroundGeneration();
  animateGivenDrop();
}

function confirmNewGame() {
  confirmOverlayEl.classList.add('show');
}

function closeConfirmOverlay() {
  confirmOverlayEl.classList.remove('show');
}

function animateGivenDrop() {
  const cells = document.querySelectorAll('.cell-inner.given');
  cells.forEach((el, i) => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = `dropBounce .6s ease-out forwards`;
    el.style.animationDelay = `${i * 15}ms`;
  });
}

// ======== RENDER ========
function renderBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < 9; r++) {
    const tr = document.createElement('tr');
    for (let c = 0; c < 9; c++) {
      const td = document.createElement('td');
      if (c % 3 === 0) td.classList.add('left');
      if (c === 8) td.classList.add('right');
      if (c % 3 === 2 && c !== 8) td.classList.add('right');
      if (r % 3 === 0) td.classList.add('top');
      if (r === 8) td.classList.add('bottom');
      if (r % 3 === 2 && r !== 8) td.classList.add('bottom');

      const wrap = document.createElement('div');
      wrap.className = 'cell-wrap';
      const inner = document.createElement('div');
      inner.className = 'cell-inner';

      const idx = r * 9 + c;
      const val = playerBoard[idx];

      if (val !== 0) {
        inner.textContent = val;
        inner.classList.add(givenMask[idx] ? 'given' : 'player');
      } else if (notes[idx] && notes[idx].size > 0) {
        inner.innerHTML = renderNotesGrid(notes[idx]);
      }

      if (r === selectedRow && c === selectedCol) inner.classList.add('selected');

      if (val !== 0 && selectedRow >= 0 && selectedCol >= 0) {
        const selVal = playerBoard[selectedRow * 9 + selectedCol];
        if (selVal !== 0 && val === selVal && idx !== selectedRow * 9 + selectedCol) {
          inner.classList.add('same-num');
        }
      }
      if (selectedRow >= 0 && selectedCol >= 0 && !(r === selectedRow && c === selectedCol)) {
        if (r === selectedRow || c === selectedCol ||
            (Math.floor(r/3) === Math.floor(selectedRow/3) && Math.floor(c/3) === Math.floor(selectedCol/3))) {
          inner.classList.add('same-row-col');
        }
      }
      if (val !== 0 && !givenMask[idx] && hasConflict(playerBoard, idx)) {
        inner.classList.add('error');
      }

      inner.addEventListener('click', () => selectCell(r, c));
      wrap.appendChild(inner);
      td.appendChild(wrap);
      tr.appendChild(td);
    }
    boardEl.appendChild(tr);
  }
}

function renderNotesGrid(noteSet) {
  let html = '<div class="notes-grid">';
  for (let n = 1; n <= 9; n++) {
    html += `<span>${noteSet.has(n) ? n : ''}</span>`;
  }
  html += '</div>';
  return html;
}

function renderCell(r, c) {
  const inner = boardEl.rows[r].cells[c].querySelector('.cell-inner');
  const idx = r * 9 + c;
  const val = playerBoard[idx];
  inner.className = 'cell-inner';

  if (val !== 0) {
    inner.textContent = val;
    inner.classList.add(givenMask[idx] ? 'given' : 'player');
  } else if (notes[idx] && notes[idx].size > 0) {
    inner.innerHTML = renderNotesGrid(notes[idx]);
  } else {
    inner.textContent = '';
  }

  if (r === selectedRow && c === selectedCol) inner.classList.add('selected');
  if (val !== 0 && !givenMask[idx] && hasConflict(playerBoard, idx)) {
    inner.classList.add('error');
  }
}

function selectCell(r, c) {
  // Allow selecting given cells for highlighting, but they can't be edited
  selectedRow = r; selectedCol = c;
  renderBoard();
  updateNumpad();
}

function buildNumpad() {
  numpadEl.innerHTML = '';
  for (let n = 1; n <= 9; n++) {
    const btn = document.createElement('button');
    btn.textContent = n;
    btn.addEventListener('click', () => {
      if (notesMode) placeNote(n);
      else placeNumber(n);
    });
    numpadEl.appendChild(btn);
  }
}

function updateNumpad() {
  const buttons = numpadEl.querySelectorAll('button');
  const counts = new Array(10).fill(0);
  for (let i = 0; i < 81; i++) {
    if (playerBoard[i] !== 0) counts[playerBoard[i]]++;
  }

  let restrictedNums = new Set();
  if (selectedRow >= 0 && selectedCol >= 0) {
    const r = selectedRow, c = selectedCol;
    let rowEmpties = 0, rowNums = new Set();
    for (let j = 0; j < 9; j++) {
      if (playerBoard[r * 9 + j] === 0) rowEmpties++;
      else rowNums.add(playerBoard[r * 9 + j]);
    }
    if (rowEmpties === 1) rowNums.forEach(n => restrictedNums.add(n));

    let colEmpties = 0, colNums = new Set();
    for (let i = 0; i < 9; i++) {
      if (playerBoard[i * 9 + c] === 0) colEmpties++;
      else colNums.add(playerBoard[i * 9 + c]);
    }
    if (colEmpties === 1) colNums.forEach(n => restrictedNums.add(n));

    let boxEmpties = 0, boxNums = new Set();
    const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
    for (let i = br; i < br + 3; i++)
      for (let j = bc; j < bc + 3; j++) {
        if (playerBoard[i * 9 + j] === 0) boxEmpties++;
        else boxNums.add(playerBoard[i * 9 + j]);
      }
    if (boxEmpties === 1) boxNums.forEach(n => restrictedNums.add(n));
  }

  buttons.forEach((btn, idx) => {
    const n = idx + 1;
    btn.disabled = counts[n] >= 9 || restrictedNums.has(n);
    btn.className = '';
    if (counts[n] >= 9) btn.classList.add('count-9');
  });
}

// ======== PLACE NUMBER / NOTE ========
function placeNumber(n) {
  if (selectedRow < 0 || selectedCol < 0) return;
  const idx = selectedRow * 9 + selectedCol;
  if (givenMask[idx]) return;
  const prev = playerBoard[idx];
  if (prev === n) return;

  if (notes[idx]) notes[idx] = null;
  history.push({ row: selectedRow, col: selectedCol, prev, isMistake: false, prevNotes: null });

  playerBoard[idx] = n;

  if (hasConflict(playerBoard, idx)) {
    mistakes++;
    history[history.length - 1].isMistake = true;
    updateMistakes();
    renderCell(selectedRow, selectedCol);
    updateNumpad();
    if (mistakes >= 3) {
      setTimeout(() => {
        alert('错误次数已达上限，游戏结束！请开始新游戏。');
      }, 300);
    }
    return;
  }

  renderBoard();
  updateNumpad();

  if (checkWin()) setTimeout(onWin, 400);
}

function placeNote(n) {
  if (selectedRow < 0 || selectedCol < 0) return;
  const idx = selectedRow * 9 + selectedCol;
  if (givenMask[idx]) return;
  if (playerBoard[idx] !== 0) return;

  const prevNotes = notes[idx] ? new Set(notes[idx]) : null;
  toggleNote(selectedRow, selectedCol, n);
  const newNotes = notes[idx] ? new Set(notes[idx]) : null;
  history.push({ row: selectedRow, col: selectedCol, prev: 0, isMistake: false, prevNotes, newNotes });

  renderCell(selectedRow, selectedCol);
}

function eraseCell() {
  if (selectedRow < 0 || selectedCol < 0) return;
  const idx = selectedRow * 9 + selectedCol;
  if (givenMask[idx]) return;
  if (playerBoard[idx] === 0 && (!notes[idx] || notes[idx].size === 0)) return;

  const prev = playerBoard[idx];
  const prevNotes = notes[idx] ? new Set(notes[idx]) : null;
  history.push({ row: selectedRow, col: selectedCol, prev, isMistake: false, prevNotes });
  playerBoard[idx] = 0;
  notes[idx] = null;
  renderCell(selectedRow, selectedCol);
  updateNumpad();
}

function undoMove() {
  if (history.length === 0) return;
  const last = history.pop();
  playerBoard[last.row * 9 + last.col] = last.prev;
  if (last.isMistake) mistakes = Math.max(0, mistakes - 1);
  if (last.prevNotes !== undefined) {
    notes[last.row * 9 + last.col] = last.prevNotes ? new Set(last.prevNotes) : null;
  }
  selectedRow = last.row;
  selectedCol = last.col;
  renderBoard();
  updateNumpad();
  updateMistakes();
}

// ======== HINT ========
function showHint() {
  hintPanelEl.classList.remove('show');
  hintPanelEl.innerHTML = '';
  hintAreaEl.classList.remove('active');

  // Strategy 1: Naked single
  for (let i = 0; i < 81; i++) {
    if (playerBoard[i] !== 0) continue;
    const r = Math.floor(i / 9), c = i % 9;
    const cands = getCandidates(playerBoard, r, c);
    if (cands.length === 1) {
      showHintResult(r, c, cands[0], 'naked', cands);
      return;
    }
  }

  // Strategy 2: Hidden single
  for (let i = 0; i < 81; i++) {
    if (playerBoard[i] !== 0) continue;
    const r = Math.floor(i / 9), c = i % 9;
    const cands = getCandidates(playerBoard, r, c);
    for (const n of cands) {
      let scope = '', idx = -1;
      let rowCount = 0, rowIdx = -1;
      for (let j = 0; j < 9; j++) {
        if (playerBoard[r * 9 + j] === 0 && getCandidates(playerBoard, r, j).includes(n)) { rowCount++; rowIdx = r * 9 + j; }
      }
      if (rowCount === 1) { scope = `第${r+1}行`; idx = rowIdx; }
      if (!scope) {
        let colCount = 0, colIdx = -1;
        for (let j = 0; j < 9; j++) {
          if (playerBoard[j * 9 + c] === 0 && getCandidates(playerBoard, j, c).includes(n)) { colCount++; colIdx = j * 9 + c; }
        }
        if (colCount === 1) { scope = `第${c+1}列`; idx = colIdx; }
      }
      if (!scope) {
        let boxCount = 0, boxIdx = -1;
        const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
        for (let i2 = br; i2 < br + 3; i2++)
          for (let j2 = bc; j2 < bc + 3; j2++) {
            if (playerBoard[i2 * 9 + j2] === 0 && getCandidates(playerBoard, i2, j2).includes(n)) { boxCount++; boxIdx = i2 * 9 + j2; }
          }
        if (boxCount === 1) { scope = `第${Math.floor(r/3)+1}行第${Math.floor(c/3)+1}列的宫`; idx = boxIdx; }
      }
      if (scope) {
        const hr = Math.floor(idx / 9), hc = idx % 9;
        showHintResult(hr, hc, n, 'hidden', getCandidates(playerBoard, hr, hc), scope);
        return;
      }
    }
  }

  // Strategy 3: Brute force — try each candidate for each empty cell
  for (let i = 0; i < 81; i++) {
    if (playerBoard[i] !== 0) continue;
    const r = Math.floor(i / 9), c = i % 9;
    const cands = getCandidates(playerBoard, r, c);
    if (cands.length === 0) continue;
    const validCands = [];
    for (const n of cands) {
      const testBoard = [...playerBoard];
      testBoard[i] = n;
      if (solve(testBoard)) validCands.push(n);
    }
    if (validCands.length === 1) {
      showHintResult(r, c, validCands[0], 'bruteforce', cands);
      return;
    }
  }

  // Strategy 4: If no single-candidate cell, show cell with fewest valid candidates
  let bestResult = null;
  let bestCount = Infinity;
  for (let i = 0; i < 81; i++) {
    if (playerBoard[i] !== 0) continue;
    const r = Math.floor(i / 9), c = i % 9;
    const cands = getCandidates(playerBoard, r, c);
    const validCands = [];
    for (const n of cands) {
      const testBoard = [...playerBoard];
      testBoard[i] = n;
      if (solve(testBoard)) validCands.push(n);
    }
    if (validCands.length > 0 && validCands.length < bestCount) {
      bestCount = validCands.length;
      bestResult = { r, c, n: validCands[0], cands: validCands.slice() };
    }
  }

  if (bestResult) {
    showHintResult(bestResult.r, bestResult.c, bestResult.n, 'bruteforce-multi', bestResult.cands);
    return;
  }

  hintPanelEl.innerHTML = '<div class="hint-line1">当前局面异常，请开始新游戏</div>';
  hintPanelEl.classList.add('show');
  hintAreaEl.classList.add('active');
}

function showHintResult(r, c, n, type, cands, scope) {
  let line1 = '', line2 = '';
  if (type === 'naked') {
    const excluded = [];
    for (let x = 1; x <= 9; x++) { if (!cands.includes(x)) excluded.push(x); }
    line1 = `R${r+1}C${c+1}（第${r+1}行第${c+1}列）→ 填入 <b style="color:#e91e63;font-size:17px;">${n}</b>　<span style="font-size:11px;color:#888;">唯余法</span>`;
    line2 = `该格行/列/宫中已有 <b>${excluded.join(', ')}</b>，仅剩候选数 <b>${n}</b>`;
  } else if (type === 'hidden') {
    line1 = `R${r+1}C${c+1}（第${r+1}行第${c+1}列）→ 填入 <b style="color:#e91e63;font-size:17px;">${n}</b>　<span style="font-size:11px;color:#888;">隐式唯一</span>`;
    line2 = `在 <b>${scope}</b> 中，数字 <b>${n}</b> 只能出现在 R${r+1}C${c+1}，该区域内其他空格均无法填入 ${n}`;
  } else if (type === 'bruteforce') {
    line1 = `R${r+1}C${c+1}（第${r+1}行第${c+1}列）→ 填入 <b style="color:#e91e63;font-size:17px;">${n}</b>　<span style="font-size:11px;color:#888;">回溯推导</span>`;
    line2 = `尝试该格其他候选数（${cands.filter(x=>x!==n).join(', ')}）均无法完成棋盘，仅 <b>${n}</b> 可得到合法终局`;
  } else if (type === 'bruteforce-multi') {
    line1 = `R${r+1}C${c+1}（第${r+1}行第${c+1}列）→ 建议 <b style="color:#e91e63;font-size:17px;">${n}</b>　<span style="font-size:11px;color:#888;">回溯推导</span>`;
    line2 = `该格候选数为 {${cands.join(', ')}}，均能完成棋盘。建议先尝试 <b>${n}</b>，或结合其他约束进一步分析`;
  }

  hintPanelEl.innerHTML = `<div class="hint-line1">${line1}</div><div class="hint-line2">${line2}</div>`;
  hintPanelEl.classList.add('show');
  hintAreaEl.classList.add('active');

  const idx = r * 9 + c;
  if (notes[idx]) notes[idx] = null;
  history.push({ row: r, col: c, prev: playerBoard[idx], isMistake: false, prevNotes: null });
  playerBoard[idx] = n;
  selectedRow = r;
  selectedCol = c;
  renderBoard();
  updateNumpad();

  setTimeout(() => {
    const inner = boardEl.rows[r].cells[c].querySelector('.cell-inner');
    if (inner) inner.classList.add('hinted');
  }, 50);

  if (checkWin()) setTimeout(onWin, 500);
}

// ======== WIN ========
function checkWin() {
  for (let i = 0; i < 81; i++) {
    if (playerBoard[i] !== solved[i]) return false;
  }
  return true;
}

function onWin() {
  stopTimer();
  const cells = document.querySelectorAll('.cell-inner');
  cells.forEach((el, i) => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = `dropBounce .4s ease-out forwards`;
    el.style.animationDelay = `${i * 20}ms`;
  });

  setTimeout(() => {
    cells.forEach((el, i) => {
      el.style.animation = `flyUp .5s ease-in forwards`;
      el.style.animationDelay = `${i * 25 + 100}ms`;
    });
  }, 600);

  setTimeout(() => {
    overlayMsgEl.textContent = `难度: ${difficulty}空 | 用时: ${formatTime(timeSec)} | 错误: ${mistakes}`;
    winOverlayEl.classList.add('show');
  }, 1400);
}

function closeWinOverlay() {
  winOverlayEl.classList.remove('show');
}

// ======== TIMER ========
function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    timeSec++;
    updateTimer();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function updateTimer() {
  timerEl.textContent = '⏱ ' + formatTime(timeSec);
}

function formatTime(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function updateMistakes() {
  mistakesEl.textContent = '错误: ' + mistakes + '/3';
}

// Start timer on first interaction
document.addEventListener('click', function startT() {
  if (!timerInterval && !winOverlayEl.classList.contains('show') && !confirmOverlayEl.classList.contains('show')) startTimer();
}, { once: false });

// ======== BOOT ========
init();
</script>
